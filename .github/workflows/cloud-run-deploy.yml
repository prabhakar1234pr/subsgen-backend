# Deploy SubsGen backend to Google Cloud Run
# Trigger: push to main
# Requires: GCP_SA_KEY, GCP_PROJECT_ID, GCP_REGION, GROQ_API_KEY_1/2/3 (or GROQ_API_KEY)

name: Deploy to Cloud Run
on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'subsgen-run-p554' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: subsgen-api
  IMAGE_NAME: subsgen-api

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/subsgen/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE_URI=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          ENV_VARS="GROQ_API_KEY_1=${{ secrets.GROQ_API_KEY_1 }},GROQ_API_KEY_2=${{ secrets.GROQ_API_KEY_2 }},GROQ_API_KEY_3=${{ secrets.GROQ_API_KEY_3 }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_URI }} \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --memory 2Gi \
            --cpu 2 \
            --timeout 3600 \
            --concurrency 1 \
            --min-instances 0 \
            --max-instances 2 \
            --allow-unauthenticated \
            --set-env-vars "$ENV_VARS"
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: 1
