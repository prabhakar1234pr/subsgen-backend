# Deploy subsgen-backend to GCP Compute Engine VM on push to main
# Uses Cloud Build (runs inside GCP) to avoid external SSH connection resets
# Requires GitHub Secrets: GCP_SA_KEY, GROQ_API_KEY (or GROQ_API_KEY_1/2/3)

name: GCP Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create .env and deploy via Cloud Build
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
        run: |
          set -e
          {
            if [ -n "$GROQ_API_KEY_1" ] || [ -n "$GROQ_API_KEY_2" ] || [ -n "$GROQ_API_KEY_3" ]; then
              echo "GROQ_API_KEY_1=$GROQ_API_KEY_1"
              echo "GROQ_API_KEY_2=$GROQ_API_KEY_2"
              echo "GROQ_API_KEY_3=$GROQ_API_KEY_3"
            else
              echo "GROQ_API_KEY=$GROQ_API_KEY"
            fi
            echo "# Deployed $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > .env.deploy

          gcloud builds submit --config=cloudbuild.yaml --project=subsgen-backend-488200 .
