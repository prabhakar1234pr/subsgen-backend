# Deploy subsgen-backend to GCP Compute Engine VM on push to main
# Uses direct SSH from GitHub Actions (Cloud Build cannot reach VM from its network)
# Requires GitHub Secrets: GCP_SA_KEY, GROQ_API_KEY (or GROQ_API_KEY_1/2/3)

name: GCP Deploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create .env and deploy via SSH
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
        run: |
          set -e
          {
            if [ -n "$GROQ_API_KEY_1" ] || [ -n "$GROQ_API_KEY_2" ] || [ -n "$GROQ_API_KEY_3" ]; then
              echo "GROQ_API_KEY_1=$GROQ_API_KEY_1"
              echo "GROQ_API_KEY_2=$GROQ_API_KEY_2"
              echo "GROQ_API_KEY_3=$GROQ_API_KEY_3"
            else
              echo "GROQ_API_KEY=$GROQ_API_KEY"
            fi
            echo "# Deployed $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > .env.deploy

          gcloud compute ssh subsgen-vm \
            --zone=us-central1-a \
            --project=subsgen-backend-488200 \
            --tunnel-through-iap \
            --strict-host-key-checking=no \
            --command="mkdir -p ~/subsgen"

          gcloud compute scp .env.deploy subsgen-vm:~/subsgen/.env \
            --zone=us-central1-a \
            --project=subsgen-backend-488200 \
            --tunnel-through-iap \
            --strict-host-key-checking=no

          gcloud compute ssh subsgen-vm \
            --zone=us-central1-a \
            --project=subsgen-backend-488200 \
            --tunnel-through-iap \
            --strict-host-key-checking=no \
            --command="
              set -e
              mkdir -p ~/subsgen
              cd ~/subsgen
              if [ ! -d .git ]; then
                git clone https://github.com/prabhakar1234pr/subsgen-backend.git .
              fi
              git fetch origin main
              git reset --hard origin/main
              sudo docker build -t subsgen-api .
              sudo docker stop subsgen 2>/dev/null || true
              sudo docker rm subsgen 2>/dev/null || true
              sudo docker run -d --name subsgen --restart unless-stopped -p 7860:7860 --env-file .env subsgen-api
              echo Deploy complete.
            "
