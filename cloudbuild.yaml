# Cloud Build: deploy to GCP VM (runs inside GCP, avoids external SSH connection issues)
# Triggered by GitHub Actions via: gcloud builds submit --config=cloudbuild.yaml
# Expects .env.deploy in the build context (created by the workflow)

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: mkdir
    entrypoint: gcloud
    args:
      - compute
      - ssh
      - subsgen-vm
      - --zone=us-central1-a
      - --project=subsgen-backend-488200
      - --strict-host-key-checking=no
      - --command=mkdir -p ~/subsgen

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: scp-env
    entrypoint: gcloud
    args:
      - compute
      - scp
      - .env.deploy
      - subsgen-vm:~/subsgen/.env
      - --zone=us-central1-a
      - --project=subsgen-backend-488200
      - --strict-host-key-checking=no

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - compute
      - ssh
      - subsgen-vm
      - --zone=us-central1-a
      - --project=subsgen-backend-488200
      - --strict-host-key-checking=no
      - --command=|
        set -e
        mkdir -p ~/subsgen
        cd ~/subsgen
        if [ ! -d .git ]; then
          git clone https://github.com/prabhakar1234pr/subsgen-backend.git .
        fi
        git fetch origin main
        git reset --hard origin/main
        sudo docker build -t subsgen-api .
        sudo docker stop subsgen 2>/dev/null || true
        sudo docker rm subsgen 2>/dev/null || true
        sudo docker run -d --name subsgen --restart unless-stopped -p 7860:7860 --env-file .env subsgen-api
        echo Deploy complete.
